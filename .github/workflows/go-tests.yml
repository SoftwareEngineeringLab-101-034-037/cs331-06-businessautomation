name: Go Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  go-services-test:
    name: Go Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth
            path: backend/auth
          - service: workflow
            path: backend/workflow
          - service: integrations
            path: backend/integrations
    defaults:
      run:
        working-directory: ./${{ matrix.path }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache-dependency-path: ./${{ matrix.path }}/go.sum

      - name: Go test
        run: go test ./...

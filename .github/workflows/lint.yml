name: Lint Checks

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  frontend-lint:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Frontend
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './Frontend/package-lock.json'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Code Linting
        run: npx next lint
        
      - name: Type Check
        run: npm run type-check

  backend-auth-lint:
    name: Backend Auth Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend/auth
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache-dependency-path: './backend/auth/go.sum'
          
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: backend/auth
      
      - name: Go fmt
        run: |
          if [ "$(go fmt ./...)" ]; then
            echo "Go code is not formatted. Run 'go fmt ./...' locally."
            exit 1
          fi
          
      - name: Go vet
        run: go vet ./...

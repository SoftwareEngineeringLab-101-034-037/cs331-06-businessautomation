name: Lint Checks

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  backend-auth-lint:
    name: Backend Auth Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend/auth
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache-dependency-path: './backend/auth/go.sum'
          
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          # Pin to a specific version for deterministic CI. Review periodically.
          version: v1.64.8
          working-directory: backend/auth
          install-mode: goinstall
      
      - name: Go fmt
        run: |
          if [ "$(go fmt ./...)" ]; then
            echo "Go code is not formatted. Run 'go fmt ./...' locally."
            exit 1
          fi
          
      - name: Go vet
        run: go vet ./...

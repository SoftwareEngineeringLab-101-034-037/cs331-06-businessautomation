name: Lint Checks

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  go-services-lint:
    name: Go Lint (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth
            path: backend/auth
          - service: workflow
            path: backend/workflow
          - service: integrations
            path: backend/integrations
    defaults:
      run:
        working-directory: ./${{ matrix.path }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache-dependency-path: ./${{ matrix.path }}/go.sum

      - name: Go fmt
        run: |
          go fmt ./...

          # Fail only when go fmt actually rewrites files.
          if [ -n "$(git status --porcelain -- '*.go')" ]; then
            echo "Go code is not formatted. Run 'go fmt ./...' locally."
            git --no-pager diff -- '*.go'
            exit 1
          fi

      - name: Go vet
        run: go vet ./...
